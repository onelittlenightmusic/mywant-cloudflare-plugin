recipe:
  metadata:
    name: "Cloudflare Tunnel"
    description: |
      Exposes a local service via a public URL using Cloudflare Tunnel (cloudflared).

      Starts a cloudflared process, waits for the Quick Tunnel URL to appear in its output,
      and stores it in state as `tunnel_url`.

      Requirements:
        - cloudflared must be installed and available in PATH

      Usage:
        mywant recipes list
        mywant wants create --recipe "Cloudflare Tunnel" -p port=3000
    custom_type: "cloudflare"
    category: "tunnel"
    version: "1.0.0"

  parameters:
    port: "8080"
    protocol: "http"
    command: "cloudflared"
    args: '["tunnel", "--url", "http://localhost:8080"]'
    url_regex: '\|\s+(https://[a-zA-Z0-9-]+\.trycloudflare\.com)\s+'
    result_field: "tunnel_url"
    max_retries: 40
    log_file: ""

  parameter_descriptions:
    port: "Local port to expose"
    protocol: "Protocol for the local service (http, tcp, tls)"
    command: "Path to cloudflared binary"
    args: "CLI arguments as JSON array"
    url_regex: "Regex to extract the tunnel URL from logs"
    result_field: "State field name to store the extracted URL"
    max_retries: "Max retries waiting for the tunnel URL"
    log_file: "Path to capture cloudflared output (auto-generated if empty)"

  wants:
    - metadata:
        type: managed_process
        labels:
          role: tunnel
          provider: cloudflare
      spec:
        params:
          command: command
          args: args
          url_regex: url_regex
          result_field: result_field
          max_retries: max_retries
          log_file: log_file

  example:
    wants:
      - metadata:
          name: "cloudflare-tunnel"
          type: "cloudflare"
          labels:
            recipe: "Cloudflare Tunnel"
        spec:
          params:
            port: "3000"
