wantType:
  metadata:
    name: cloudflare
    title: Cloudflare Tunnel Running
    description: |
      Manages a Cloudflare Tunnel (cloudflared) lifecycle to expose a local service via a public URL.

      Automatically starts a cloudflared process, parses the forwarding URL from its log,
      and stores it in the tunnel_url state. Uses the live_server_manager agent for
      process lifecycle management (start/stop/SIGTERM).

      The forwarding URL is parsed from cloudflared's output (Quick Tunnel format).
    version: '1.0'
    category: system
    pattern: independent

  finalResultField: tunnel_url

  parameters:
  - name: command
    description: Command to start the cloudflared process
    type: string
    required: false
    default: "cloudflared"

  - name: args
    description: Arguments for the cloudflared process (JSON array string)
    type: string
    required: false
    default: '["tunnel", "--url", "http://localhost:8080"]'

  - name: url_regex
    description: Regex to extract the forwarding URL from logs
    type: string
    required: false
    default: '\|\s+(https://[a-zA-Z0-9-]+\.trycloudflare\.com)\s+'

  - name: result_field
    description: State field name to store the extracted URL
    type: string
    required: false
    default: 'tunnel_url'

  - name: port
    description: Local port to expose through the Cloudflare tunnel
    type: string
    required: false
    default: "8080"
    example: "3000"

  - name: protocol
    description: Protocol for the local service (http, tcp, tls)
    type: string
    required: false
    default: "http"

  - name: log_file
    description: Path to capture cloudflared output (auto-generated if empty)
    type: string
    required: false
    default: ""
    example: /tmp/cloudflare-tunnel.log

  - name: max_retries
    description: Maximum retries to wait for tunnel URL in log
    type: int
    required: false
    default: 40

  state:
  - name: url_regex
    description: Regex to extract the forwarding URL from logs (promoted from param by Initialize)
    type: string
    persistent: false
    label: current
    initialValue: ''

  - name: result_field
    description: State field name to store the extracted URL (promoted from param by Initialize)
    type: string
    persistent: false
    label: current
    initialValue: 'result_url'

  - name: max_retries
    description: Maximum retries to wait for forwarding URL in log (promoted from param by Initialize)
    type: int
    persistent: false
    label: current
    initialValue: 40

  - name: server_phase
    description: Current phase of the tunnel lifecycle
    type: string
    persistent: true
    label: current
    initialValue: starting
    example: running

  - name: server_pid
    description: Process ID of the running cloudflared process (0 if not running)
    type: int
    persistent: true
    label: current
    initialValue: 0
    example: 12345

  - name: server_command
    description: Command to start the cloudflared process
    type: string
    persistent: true
    label: current
    initialValue: "cloudflared"

  - name: server_args
    description: Arguments for the cloudflared process (JSON array)
    type: string
    persistent: true
    label: current
    initialValue: ""

  - name: server_log_file
    description: Path to capture cloudflared output
    type: string
    persistent: true
    label: current
    initialValue: ""

  - name: tunnel_url
    description: Public forwarding URL assigned by Cloudflare (trycloudflare.com)
    type: string
    persistent: true
    label: current
    initialValue: ""
    example: "https://xxxx-xxxx-xxxx.trycloudflare.com"

  - name: error_message
    description: Error message if tunnel failed to start
    type: string
    persistent: true
    label: current
    initialValue: ''

  connectivity:
    inputs: []
    outputs: []

  require:
    connectivity: none

  requires:
    - live_server_management

  agents:
  - name: live_server_management
    role: action
    description: DoAgent that starts and stops the cloudflared process

  constraints:
  - description: cloudflared must be installed and available in PATH
    validation: cloudflared command must be resolvable via exec.LookPath

  examples:
  - name: basic_cloudflare_tunnel
    description: Expose a local HTTP server on port 8080 via Cloudflare
    want:
      metadata:
        name: cloudflare-tunnel
        type: cloudflare_tunnel
        labels:
          service: tunnel
      spec:
        params:
          port: "8080"

  - name: custom_port_cloudflare_tunnel
    description: Expose a local service on a custom port via Cloudflare
    want:
      metadata:
        name: cloudflare-api-tunnel
        type: cloudflare_tunnel
        labels:
          service: api-tunnel
      spec:
        params:
          port: "3000"
          protocol: "http"

  relatedTypes: [ngrok]
  seeAlso: []
